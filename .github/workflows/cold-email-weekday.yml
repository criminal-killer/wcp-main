name: 📧 Cold Email Outreach
on:
  schedule:
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  outreach:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: wacommerce/phase-1-waitlist/automation
        run: npm init -y && npm install axios nodemailer @libsql/client

      - name: Scrape businesses
        working-directory: wacommerce/phase-1-waitlist/automation
        run: node scripts/scrape-businesses.js
        env:
          CITY_NAME: Nairobi
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Send cold emails
        working-directory: wacommerce/phase-1-waitlist/automation
        run: node scripts/send-cold-emails.js
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          FROM_NAME: "Alfred from Sella"
          WAITLIST_URL: ${{ secrets.WAITLIST_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📧 Cold email batch sent"
          file_pattern: wacommerce/phase-1-waitlist/automation/scripts/scraped-businesses.json
