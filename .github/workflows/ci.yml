name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (all workspaces)
        run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (all workspaces)
        run: npm run lint

  build-merchant:
    name: Build Merchant App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    env:
      # Build-time env stubs — real values are in Vercel environment variables
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL || 'libsql://stub.turso.io' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN || 'stub' }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL || 'https://chatevo.app' }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_stub' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_stub' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build merchant
        run: npm run build:merchant

  build-admin:
    name: Build Admin App
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    env:
      TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL || 'libsql://stub.turso.io' }}
      TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN || 'stub' }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'pk_test_stub' }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'sk_test_stub' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: npm run build:admin
