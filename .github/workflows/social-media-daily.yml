name: 📱 Daily Social Media Posts
on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: wacommerce/phase-1-waitlist/automation
        run: npm init -y && npm install axios @libsql/client

      - name: Post to social media
        working-directory: wacommerce/phase-1-waitlist/automation
        run: node scripts/post-to-social.js
        env:
          FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
          WAITLIST_URL: ${{ secrets.WAITLIST_URL }}
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📱 Auto-posted to social media"
          file_pattern: wacommerce/phase-1-waitlist/automation/content-bank.json
