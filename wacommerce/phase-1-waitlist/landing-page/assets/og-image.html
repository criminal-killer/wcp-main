<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #075E54, #25D366, #128C7E);
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, sans-serif; color: white; padding: 60px;
  }
  .content { text-align: center; }
  .logo { font-size: 48px; font-weight: 800; margin-bottom: 20px; }
  h1 { font-size: 56px; font-weight: 800; margin-bottom: 16px; line-height: 1.1; }
  p { font-size: 24px; opacity: 0.9; max-width: 700px; margin: 0 auto; }
  .badge {
    display: inline-block; background: rgba(255,255,255,0.2);
    padding: 8px 20px; border-radius: 20px; font-size: 18px; margin-top: 24px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo">Sella 🟢</div>
    <h1>Sell Smarter.<br>On WhatsApp.</h1>
    <p>Turn your WhatsApp into a store. Customers browse, buy, and pay — all in chat.</p>
    <div class="badge">Starting at $29/mo • 0% Markup</div>
  </div>
</body>
</html>
